name: Build and Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: meta
        run: |
          SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          BASE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "primary=${BASE}:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t "${{ steps.meta.outputs.primary }}" .

      - name: Push image
        run: docker push "${{ steps.meta.outputs.primary }}"

      - name: Update image tag in gitops repo
        run: |
          SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          git clone https://x-access-token:${GITOPS_PAT}@github.com/codesqueak/gitops.git gitops-repo
          cd gitops-repo
          sed -i "s/tag: .*/tag: \"${SHA}\"/" gitops-repo/environments/dev/motd-ui-values.yaml
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add gitops-repo/environments/dev/motd-ui-values.yaml
          git commit -m "ci: update motd-ui image tag to ${SHA}"
          git push
